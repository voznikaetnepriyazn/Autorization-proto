version: "3"  

tasks:  
  default: 
    cmds:  
      - task: generate  
  generate:  
    aliases: 
      - gen  
    desc: "Generate code from proto files"  
    cmds:  
      - protoc -I proto proto/*.proto --go_out=./generated/ --go_opt=paths=source_relative --go-grpc_out=./generated/ --go-grpc_opt=paths=source_relative
